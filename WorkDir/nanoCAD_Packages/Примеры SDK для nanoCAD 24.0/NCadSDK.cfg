;weight=iВесКнопки |CmdType=i1
;intername=sИмяВыполняемойКоманды
;BitmapDll=sРесурснаяБиблиотека.dll |ТипФайлаBMPилиИконка=sНазваниеИзРесурснойБиблиотеки
;DispName=sОтображаемоеИмяЕслиВключеноОтображениеНазванийКнопок
;ToolTipText=sНадпись При Наведении Мышью
;StatusText=sНадпись При Наведении Мышью

;Примечание
;В ленту (ribbon) можно подключить только те кнопки, которые описаны в разделе [\configman\commands\].
;Привязка кнопок к ленте осуществляется через параметр MenuMacroID, который указывается в файле с расширением .cui.
;Значение параметра MenuMacroID в файле .cui должно соответствовать имени команды в файле меню (.cfg).
;Например,
;Если [\configman\commands\MyNewCommand5], тогда MenuMacroID="MyNewCommand5".

[\configman\commands\HelloNRX]
weight=i30 |CmdType=i1
intername=sHelloNRX
