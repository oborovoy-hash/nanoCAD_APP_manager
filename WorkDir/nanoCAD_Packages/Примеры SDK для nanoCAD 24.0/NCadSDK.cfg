;Подключение ленты (ribbon)
;Файл NCadSDK.cuix является zip-архивом, который содержит три файла:
;Файл Menu_Package_Info.xml содержит метаинформацию
;Файл [Content_Types].xml содержит метаинформацию
;Файл RibbonRoot.cui - основной файл ленты (ribbon).
[\ribbon\SDK]
CUIX=s%CFG_PATH%\NCadSDK.cuix
visible=f1
